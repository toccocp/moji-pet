<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>もじペット 調整ツール</title>
<style>
:root{
  --pink:#FF9EC4; --pink-pale:#FFF0F6; --ink:#6B5560; --ink-soft:#9C8791; --card:#FFFFFF;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  margin:0;font-family:"Hiragino Maru Gothic ProN","ヒラギノ丸ゴ ProN W4",-apple-system,sans-serif;
  background:linear-gradient(170deg,#FFF3F8 0%,#F3F6FF 55%,#F0FBF5 100%);
  color:var(--ink);padding:16px 14px 60px;
}
h1{font-size:16px;margin:0 0 4px;}
.hint{font-size:12px;color:var(--ink-soft);margin:0 0 16px;line-height:1.6;}
.stagebar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.stagebar button{
  border:none;border-radius:12px;padding:8px 14px;font-family:inherit;font-size:13px;font-weight:700;
  background:rgba(255,255,255,.7);color:var(--ink-soft);
}
.stagebar button.active{background:var(--pink);color:#fff;}
.pets{display:flex;flex-direction:column;gap:14px;}
.pet-card{
  background:var(--card);border-radius:18px;padding:14px;
  box-shadow:0 4px 14px rgba(107,85,96,.08);
}
.pet-card-head{display:flex;align-items:center;gap:14px;margin-bottom:10px;}
.pet-name{font-weight:800;font-size:15px;flex:1;}
.reset-btn{
  border:none;background:none;font-family:inherit;font-size:11px;color:var(--ink-soft);
  text-decoration:underline;padding:4px 6px;
}
.frames{display:flex;gap:16px;align-items:center;flex-wrap:wrap;}
.frame-real{
  width:116px;height:116px;border-radius:50%;background:var(--pink-pale);
  display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;overflow:hidden;flex:none;
}
.frame-big{
  width:180px;height:180px;border-radius:50%;background:var(--pink-pale);
  display:flex;align-items:flex-end;justify-content:center;padding-bottom:10px;overflow:hidden;flex:none;
}
.frame-big img,.frame-real img{display:block;}
.frame-label{font-size:10px;color:var(--ink-soft);text-align:center;margin-top:4px;}
.sliders{flex:1;min-width:220px;width:100%;display:flex;flex-direction:column;gap:10px;}
.slider-row{display:flex;align-items:center;gap:8px;}
.slider-row label{font-size:12px;font-weight:700;color:var(--ink-soft);width:52px;flex:none;}
.slider-row input[type=range]{flex:1;min-width:80px;}
.slider-row input[type=number]{
  width:60px;flex:none;font-family:inherit;font-size:13px;font-weight:700;
  text-align:right;padding:4px 6px;border:1px solid #E8DEF8;border-radius:8px;
  background:#FDFCFE;color:var(--ink);
}
.slider-row input[type=number]:focus{outline:2px solid var(--pink);border-color:transparent;}
.unit{font-size:11px;color:var(--ink-soft);width:12px;flex:none;}

/* ---------- 一括設定 ---------- */
.bulkbox{
  background:var(--card);border-radius:18px;padding:12px 14px;margin-bottom:14px;
  box-shadow:0 4px 14px rgba(107,85,96,.08);
}
.bulkbox h2{font-size:13px;margin:0 0 4px;}
.bulkbox .sub{font-size:11px;color:var(--ink-soft);margin:0 0 10px;line-height:1.5;}
.bulk-fields{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.bulk-field{display:flex;align-items:center;gap:5px;}
.bulk-field label{font-size:12px;font-weight:700;color:var(--ink-soft);}
.bulk-field input{
  width:64px;font-family:inherit;font-size:13px;font-weight:700;text-align:right;
  padding:5px 6px;border:1px solid #E8DEF8;border-radius:8px;background:#FDFCFE;color:var(--ink);
}
.applybtn{
  border:none;border-radius:999px;background:var(--pink);color:#fff;
  font-family:inherit;font-size:13px;font-weight:800;padding:8px 18px;
}
.applybtn:active{transform:scale(.97);}
.applybtn.ghost{background:#F0E4EC;color:#7A4A66;}

/* ---------- 背景色 ---------- */
.bgbox{
  background:var(--card);border-radius:18px;padding:12px 14px;margin-bottom:14px;
  box-shadow:0 4px 14px rgba(107,85,96,.08);
}
.bgbox h2{font-size:13px;margin:0 0 4px;}
.bgbox .sub{font-size:11px;color:var(--ink-soft);margin:0 0 10px;line-height:1.5;}
.swatches{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.sw{
  width:34px;height:34px;border-radius:50%;border:2px solid #eee;padding:0;
  cursor:pointer;flex:none;
}
.sw.active{border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,158,196,.25);}
.sw-custom{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink-soft);font-weight:700;}
.sw-custom input[type=color]{
  width:34px;height:34px;border:none;background:none;padding:0;cursor:pointer;
}
.exportbox{
  margin-top:22px;background:var(--card);border-radius:18px;padding:14px;
  box-shadow:0 4px 14px rgba(107,85,96,.08);
}
.exportbox h2{font-size:14px;margin:0 0 8px;}
.exportbox textarea{
  width:100%;height:120px;font-family:ui-monospace,Menlo,monospace;font-size:12px;
  border:1px solid #eee;border-radius:10px;padding:10px;resize:vertical;background:#FAFAF9;color:#333;
}
.copybtn{
  margin-top:10px;border:none;border-radius:999px;background:var(--pink);color:#fff;
  font-family:inherit;font-size:14px;font-weight:800;padding:10px 24px;
}
.copybtn:active{transform:scale(.97);}
.copied{font-size:12px;color:#0F6E56;margin-left:10px;font-weight:700;}
</style>
</head>
<body>

<h1>もじペット イラスト調整ツール</h1>
<p class="hint">スライダーで大きさ・位置を動かすと、その場でプレビューに反映されます。<br>調整が終わったら一番下の枠の内容をコピーしてClaudeに送ってください。</p>

<div class="stagebar" id="stagebar"></div>

<div class="bgbox">
  <h2>枠の背景色</h2>
  <p class="sub">アイコン用に色を変えて見え方を確認できます（調整値には影響しません）。</p>
  <div class="swatches" id="swatches"></div>
</div>

<div class="bulkbox">
  <h2>この段階の全員に一括適用</h2>
  <p class="sub">いま開いている段階の5キャラすべてに、同じ数値をまとめて設定します。</p>
  <div class="bulk-fields">
    <div class="bulk-field"><label>拡大</label><input type="number" id="bulk-scale" step="1"><span class="unit">%</span></div>
    <div class="bulk-field"><label>左右</label><input type="number" id="bulk-x" step="1"><span class="unit">%</span></div>
    <div class="bulk-field"><label>上下</label><input type="number" id="bulk-y" step="1"><span class="unit">%</span></div>
    <button class="applybtn" onclick="applyBulk()">全員に適用</button>
    <button class="applybtn ghost" onclick="resetStageAll()">この段階を全員リセット</button>
  </div>
</div>

<div class="pets" id="pets"></div>

<div class="exportbox">
  <h2>書き出しコード</h2>
  <textarea id="exportText" readonly></textarea>
  <br>
  <button class="copybtn" onclick="copyExport()">コピーする</button>
  <span class="copied" id="copiedMsg" style="display:none;">コピーしました</span>
</div>

<script src="pet-data.js"></script>
<script>
const KEYS=['neko','tori','kuma','inu','iruka'];
const NAMES={neko:'ねこ',tori:'シマエナガ',kuma:'くま',inu:'プードル',iruka:'イルカ'};
const STAGE_NAMES=['たまご','あかちゃん','こども','おとな','キラキラ'];
const PCT_S=[50,57,70,91,91];

/* 現在アプリに入っている値(初期値として読み込む) */
const SHIPPED_SCALE={
  neko:{0:1.40,1:0.83,2:0.95,3:1.02,4:1.01},
  tori:{0:1.40,1:0.83,2:0.88,3:1.03,4:1.20},
  kuma:{0:1.40,1:0.83,2:0.95,3:0.97,4:1.05},
  inu:{0:1.40,1:0.83,2:0.95,3:1.06,4:1.21},
  iruka:{0:1.40,1:0.83,2:0.95,3:0.91,4:1.10}
};
const SHIPPED_NUDGE={
  neko:{0:{y:-10},1:{y:-26},2:{x:4,y:3},3:{x:2,y:3},4:{x:2,y:-1}},
  tori:{0:{y:-10},1:{y:-26},2:{x:7,y:-4},3:{x:3,y:-8},4:{y:-8}},
  kuma:{0:{y:-10},1:{y:-26},3:{x:3,y:-1},4:{x:3,y:-9}},
  inu:{0:{y:-10},1:{y:-26},3:{x:1,y:-4},4:{y:-5}},
  iruka:{0:{y:-10},1:{y:-26},2:{x:5,y:-28},3:{x:-3,y:-11},4:{x:2,y:-9}}
};

const STORE_KEY='mojiPetTuneDraft';
let state=loadState();
let curStage=3;

function defaultEntry(){ return {scale:100,x:0,y:0}; }
/* SHIPPED_SCALEは 数値(全段階共通) と {段階:倍率} の両方を受け付ける */
function shippedScale(k,st){
  const v=SHIPPED_SCALE[k];
  if(v==null)return 100;
  const n=(typeof v==='object') ? (v[st]||1) : v;
  return Math.round(n*100);
}
function baseEntry(k,st){
  const base=defaultEntry();
  base.scale=shippedScale(k,st);
  const nu=SHIPPED_NUDGE[k]&&SHIPPED_NUDGE[k][st];
  if(nu){ base.x=nu.x||0; base.y=nu.y||0; }
  return base;
}
function loadState(){
  let saved={};
  try{saved=JSON.parse(localStorage.getItem(STORE_KEY)||'{}');}catch(e){}
  const s={};
  for(const k of KEYS){
    s[k]={};
    for(let st=0;st<5;st++){
      const base=baseEntry(k,st);
      s[k][st]=(saved[k]&&saved[k][st])?Object.assign(base,saved[k][st]):base;
    }
  }
  return s;
}
function saveState(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

function petStyle(k,st){
  const e=state[k][st];
  const pct=(PCT_S[st]*e.scale/100).toFixed(1);
  return `max-width:${pct}%;max-height:${pct}%;transform:translate(${e.x}%,${e.y}%);`;
}

function renderStageBar(){
  const bar=document.getElementById('stagebar');
  bar.innerHTML='';
  STAGE_NAMES.forEach((name,st)=>{
    const b=document.createElement('button');
    b.textContent=name;
    b.className=st===curStage?'active':'';
    b.onclick=()=>{curStage=st;renderAll();};
    bar.appendChild(b);
  });
}

function renderPets(){
  const wrap=document.getElementById('pets');
  wrap.innerHTML='';
  KEYS.forEach(k=>{
    const card=document.createElement('div');
    card.className='pet-card';
    card.innerHTML=`
      <div class="pet-card-head">
        <div class="pet-name">${NAMES[k]}</div>
        <button class="reset-btn" data-reset="${k}">この段階をリセット</button>
      </div>
      <div class="frames">
        <div>
          <div class="frame-big" id="big-${k}"><img id="img-big-${k}" src="${PET_IMG[k][curStage]}"></div>
          <div class="frame-label">拡大表示</div>
        </div>
        <div>
          <div class="frame-real" id="real-${k}"><img id="img-real-${k}" src="${PET_IMG[k][curStage]}"></div>
          <div class="frame-label">実寸</div>
        </div>
        <div class="sliders">
          <div class="slider-row">
            <label>拡大</label>
            <input type="range" min="30" max="200" step="1" id="scale-${k}">
            <input type="number" min="10" max="400" step="1" id="scalenum-${k}"><span class="unit">%</span>
          </div>
          <div class="slider-row">
            <label>左右</label>
            <input type="range" min="-60" max="60" step="1" id="x-${k}">
            <input type="number" min="-200" max="200" step="1" id="xnum-${k}"><span class="unit">%</span>
          </div>
          <div class="slider-row">
            <label>上下</label>
            <input type="range" min="-60" max="60" step="1" id="y-${k}">
            <input type="number" min="-200" max="200" step="1" id="ynum-${k}"><span class="unit">%</span>
          </div>
        </div>
      </div>
    `;
    wrap.appendChild(card);
  });

  wrap.querySelectorAll('[data-reset]').forEach(btn=>{
    btn.onclick=()=>{
      const k=btn.dataset.reset;
      state[k][curStage]=baseEntry(k,curStage);
      saveState();
      syncSliders(k);
      updatePreview(k);
      renderExport();
    };
  });

  KEYS.forEach(k=>{
    ['scale','x','y'].forEach(prop=>{
      const idBase = prop==='scale' ? 'scale' : prop;
      const slider=document.getElementById(idBase+'-'+k);
      const num=document.getElementById(idBase+'num-'+k);
      /* スライダー → 数値入力 */
      slider.oninput=()=>{ setValue(k,prop,parseInt(slider.value,10)); };
      /* 数値入力 → スライダー(空欄や不正値は無視して通知だけしない) */
      num.oninput=()=>{
        const v=parseInt(num.value,10);
        if(isNaN(v))return;
        setValue(k,prop,v,true);
      };
      num.onblur=()=>{ syncSliders(k); };
    });
  });
}

/* 値を1か所で更新して、スライダー・数値・プレビュー・書き出しをすべて同期 */
function setValue(k,prop,v,fromNumber){
  state[k][curStage][prop]=v;
  saveState();
  const idBase = prop==='scale' ? 'scale' : prop;
  const slider=document.getElementById(idBase+'-'+k);
  const num=document.getElementById(idBase+'num-'+k);
  if(slider && !fromNumber) num.value=v;
  if(slider && fromNumber){
    /* 数値がスライダーの範囲外でも値は保持し、つまみは端で止める */
    slider.value=Math.max(slider.min, Math.min(slider.max, v));
  }
  updatePreview(k);
  renderExport();
}

function syncSliders(k){
  const e=state[k][curStage];
  [['scale',e.scale],['x',e.x],['y',e.y]].forEach(([prop,v])=>{
    const slider=document.getElementById(prop+'-'+k);
    const num=document.getElementById(prop+'num-'+k);
    slider.value=Math.max(slider.min, Math.min(slider.max, v));
    num.value=v;
  });
}

function updatePreview(k){
  const style=petStyle(k,curStage);
  const imgBig=document.getElementById('img-big-'+k);
  const imgReal=document.getElementById('img-real-'+k);
  imgBig.src=PET_IMG[k][curStage]; imgBig.style=style;
  imgReal.src=PET_IMG[k][curStage]; imgReal.style=style;
}

/* ---------- 一括適用 ---------- */
function applyBulk(){
  const sv=parseInt(document.getElementById('bulk-scale').value,10);
  const xv=parseInt(document.getElementById('bulk-x').value,10);
  const yv=parseInt(document.getElementById('bulk-y').value,10);
  /* 空欄の項目は変更しない(拡大だけ揃える、といった使い方ができる) */
  if(isNaN(sv)&&isNaN(xv)&&isNaN(yv)){
    alert('拡大・左右・上下のどれかに数値を入れてください');
    return;
  }
  KEYS.forEach(k=>{
    if(!isNaN(sv)) state[k][curStage].scale=sv;
    if(!isNaN(xv)) state[k][curStage].x=xv;
    if(!isNaN(yv)) state[k][curStage].y=yv;
  });
  saveState();
  KEYS.forEach(k=>{ syncSliders(k); updatePreview(k); });
  renderExport();
}
function resetStageAll(){
  if(!confirm('この段階の5キャラすべてを初期値に戻しますか?'))return;
  KEYS.forEach(k=>{ state[k][curStage]=baseEntry(k,curStage); });
  saveState();
  KEYS.forEach(k=>{ syncSliders(k); updatePreview(k); });
  syncBulkFields();
  renderExport();
}
/* 一括欄には、いま全員が同じ値ならその値を、バラバラなら空欄を表示 */
function syncBulkFields(){
  [['scale','bulk-scale'],['x','bulk-x'],['y','bulk-y']].forEach(([prop,id])=>{
    const vals=KEYS.map(k=>state[k][curStage][prop]);
    const same=vals.every(v=>v===vals[0]);
    document.getElementById(id).value = same ? vals[0] : '';
  });
}

/* ---------- 枠の背景色 ---------- */
const BG_PRESETS=[
  {name:'標準(ピンク)', color:'#FFF0F6'},
  {name:'白',          color:'#FFFFFF'},
  {name:'クリーム',    color:'#FFF9F2'},
  {name:'ミント',      color:'#C9F2E1'},
  {name:'空',          color:'#D6EBFA'},
  {name:'ラベンダー',  color:'#E8DEF8'},
  {name:'濃いピンク',  color:'#FFBED7'},
  {name:'グレー',      color:'#D8D5DA'},
  {name:'黒',          color:'#3A3340'}
];
let curBg=localStorage.getItem('mojiPetTuneBg')||'#FFF0F6';
function applyBg(color){
  curBg=color;
  localStorage.setItem('mojiPetTuneBg',color);
  document.querySelectorAll('.frame-real,.frame-big').forEach(el=>{
    el.style.background=color;
  });
  document.querySelectorAll('.sw').forEach(b=>{
    b.classList.toggle('active', b.dataset.color && b.dataset.color.toLowerCase()===color.toLowerCase());
  });
  const picker=document.getElementById('bgPicker');
  if(picker) picker.value=color;
}
function renderSwatches(){
  const box=document.getElementById('swatches');
  box.innerHTML='';
  BG_PRESETS.forEach(p=>{
    const b=document.createElement('button');
    b.className='sw';
    b.style.background=p.color;
    b.dataset.color=p.color;
    b.title=p.name;
    b.setAttribute('aria-label', p.name);
    b.onclick=()=>applyBg(p.color);
    box.appendChild(b);
  });
  const custom=document.createElement('div');
  custom.className='sw-custom';
  custom.innerHTML='<input type="color" id="bgPicker"><span>自由に選ぶ</span>';
  box.appendChild(custom);
  custom.querySelector('#bgPicker').oninput=(e)=>applyBg(e.target.value);
}

function renderExport(){
  const scaleEntries=[]; const nudgeEntries=[];
  KEYS.forEach(k=>{
    /* ずらしは種ごとに1エントリへまとめる(段階ごとに分けて書くと後勝ちで上書きされるため) */
    const perStage=[];
    for(let st=0;st<5;st++){
      const e=state[k][st];
      if(e.x!==0||e.y!==0){
        const parts=[];
        if(e.x) parts.push(`x:${e.x}`);
        if(e.y) parts.push(`y:${e.y}`);
        perStage.push(`${st}:{${parts.join(',')}}`);
      }
    }
    if(perStage.length) nudgeEntries.push(`  ${k}:{${perStage.join(',')}}`);

    /* 拡大: 全段階が同じ値なら1つの数値、段階ごとに違えば{段階:倍率}で書き出す */
    const scales=[0,1,2,3,4].map(st=>state[k][st].scale);
    const allSame=scales.every(v=>v===scales[0]);
    if(allSame){
      if(scales[0]!==100) scaleEntries.push(`  ${k}:${(scales[0]/100).toFixed(2)}`);
    }else{
      const parts=[];
      scales.forEach((v,st)=>{ if(v!==100) parts.push(`${st}:${(v/100).toFixed(2)}`); });
      if(parts.length) scaleEntries.push(`  ${k}:{${parts.join(',')}}`);
    }
  });
  const code =
`const SCALE_S={\n${scaleEntries.join(',\n')}\n};\nconst NUDGE_S={\n${nudgeEntries.join(',\n')}\n};`;
  document.getElementById('exportText').value = code;
}

function renderAll(){
  renderStageBar();
  renderPets();
  KEYS.forEach(k=>{ syncSliders(k); updatePreview(k); });
  syncBulkFields();
  applyBg(curBg);      /* 再描画で枠が作り直されるため色を塗り直す */
  renderExport();
}
function copyExport(){
  const ta=document.getElementById('exportText');
  ta.select();
  document.execCommand('copy');
  const msg=document.getElementById('copiedMsg');
  msg.style.display='inline';
  setTimeout(()=>msg.style.display='none',1800);
}

renderSwatches();
renderAll();
</script>
</body>
</html>
