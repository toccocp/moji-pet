<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="もじペット">
<meta name="theme-color" content="#FF9EC4">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="manifest" href="manifest.webmanifest">
<title>もじペット</title>
<style>
:root{
  --pink:#FF9EC4; --pink-soft:#FFD6E8; --pink-pale:#FFF0F6;
  --mint:#7ED8B4; --mint-soft:#C9F2E1;
  --sky:#8FC9F0; --sky-soft:#D6EBFA;
  --lav:#B9A3E3; --lav-soft:#E8DEF8;
  --cream:#FFF9F2; --sun:#FFD98E;
  --ink:#6B5560; --ink-soft:#9C8791;
  --card:#FFFFFF;
  --radius:22px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
html{height:100%;}
body{
  font-family:"Hiragino Maru Gothic ProN","ヒラギノ丸ゴ ProN W4","Rounded Mplus 1c",-apple-system,sans-serif;
  background:linear-gradient(170deg,#FFF3F8 0%,#F3F6FF 55%,#F0FBF5 100%);
  color:var(--ink);
  min-height:100%;
  padding-bottom:calc(20px + env(safe-area-inset-bottom));
}
.wrap{max-width:440px;margin:0 auto;padding:12px 14px 0;}

/* ---------- ペットエリア ---------- */
.pet-area{
  background:var(--card);border-radius:var(--radius);
  padding:12px 16px;display:flex;align-items:center;gap:14px;
  box-shadow:0 6px 18px rgba(255,158,196,.18);
}
.pet-face{
  width:116px;height:116px;border-radius:50%;
  background:var(--pink-pale);
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:6px;
  font-size:64px;flex:none;overflow:hidden;
}
.pet-face img{display:block;}
.pet-face.bounce{animation:bounce .5s ease;}
@keyframes bounce{0%{transform:translateY(0)}35%{transform:translateY(-12px) scale(1.06)}70%{transform:translateY(0)}85%{transform:translateY(-4px)}100%{transform:translateY(0)}}
.pet-info{flex:1;min-width:0;}
.meter{display:flex;gap:4px;}
.meter span{flex:1;height:11px;border-radius:6px;background:#F0E4EC;transition:background .25s;}
.meter span.on{background:var(--pink);}

/* ---------- レベル切り替え ---------- */
.levels{display:flex;gap:8px;margin-top:12px;}
.lv{
  flex:1;border:none;border-radius:14px;padding:8px 0;
  font-family:inherit;font-size:20px;font-weight:800;color:var(--ink-soft);
  background:rgba(255,255,255,.7);
}
.lv.active{color:#7A4A66;background:var(--pink-soft);box-shadow:0 3px 8px rgba(255,158,196,.3);}

/* ---------- お題カード ---------- */
.quiz{
  background:var(--card);border-radius:var(--radius);
  padding:14px 14px 16px;margin-top:12px;text-align:center;
  box-shadow:0 6px 18px rgba(143,201,240,.16);
}
.roma{
  font-size:30px;font-weight:800;color:var(--ink);
  letter-spacing:1px;margin-top:4px;line-height:1.2;
  font-family:ui-rounded,"Hiragino Maru Gothic ProN",sans-serif;
  word-break:keep-all;overflow-wrap:anywhere;
}
.roma b{color:#D4537E;}
.slots{display:flex;justify-content:center;gap:7px;margin-top:12px;flex-wrap:wrap;}
.slot{
  width:44px;height:44px;border-radius:12px;
  background:#F6F2F4;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:800;color:#085041;
  transition:transform .2s;
}
.slot.done{background:var(--mint-soft);}
.slot.done.sp{background:var(--sun);color:#8A5A2E;}
.slot.now{background:var(--cream);border:2px dashed var(--sun);color:#BA7517;font-size:19px;}
.slot.pop{animation:pop .35s ease;}
@keyframes pop{0%{transform:scale(.5)}60%{transform:scale(1.2)}100%{transform:scale(1)}}

/* ---------- 9文字グリッド ---------- */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px;}
.cell{
  aspect-ratio:1;border:none;border-radius:18px;
  background:var(--card);
  font-family:inherit;font-size:38px;font-weight:600;color:var(--ink);
  border-bottom:5px solid var(--pink-soft);
  box-shadow:0 3px 10px rgba(107,85,96,.08);
  transition:transform .1s;
}
.cell:active{transform:scale(.94);}
.cell:nth-child(3n+2){border-bottom-color:var(--sky-soft);}
.cell:nth-child(3n){border-bottom-color:var(--mint-soft);}
.cell:nth-child(4),.cell:nth-child(8){border-bottom-color:var(--lav-soft);}
.cell.wrong{animation:shake .4s ease;background:#FBF3F5;color:#D9C3CC;border-bottom-color:#F0E4EC;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}50%{transform:translateX(6px)}75%{transform:translateX(-4px)}}

/* ---------- オーバーレイ ---------- */
.overlay{
  position:fixed;inset:0;background:rgba(255,240,246,.92);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:50;padding:24px;
}
.overlay.hidden{display:none;}
.ov-outer{width:100%;max-width:330px;text-align:center;}
.ov-card{
  background:var(--card);border-radius:26px;padding:28px 22px;
  text-align:center;width:100%;max-width:330px;
  box-shadow:0 12px 36px rgba(255,158,196,.35);
  animation:ovin .35s ease;
}
@keyframes ovin{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}}
.ov-emoji{font-size:64px;line-height:1.1;display:flex;justify-content:center;align-items:flex-end;min-height:110px;}
.ov-word{font-size:34px;font-weight:800;color:#7A4A66;margin-top:8px;letter-spacing:2px;}
.ov-word .spc{color:#BA7517;}
.ov-msg{font-size:15px;font-weight:800;color:var(--ink);margin-top:10px;line-height:1.6;}
.ov-sub{font-size:12px;color:var(--ink-soft);font-weight:700;margin-top:6px;line-height:1.6;}
.ov-btn{
  margin-top:18px;border:none;border-radius:999px;
  background:var(--pink);color:#fff;
  font-family:inherit;font-size:16px;font-weight:800;
  padding:13px 36px;box-shadow:0 5px 14px rgba(255,158,196,.5);
}
.ov-btn:active{transform:scale(.96);}
.confetti{position:absolute;font-size:22px;animation:fall 1.6s ease-in forwards;}
@keyframes fall{0%{transform:translateY(-40px) rotate(0);opacity:1}100%{transform:translateY(70vh) rotate(300deg);opacity:0}}

.hidden{display:none!important;}

.foot{
  text-align:center;margin-top:16px;font-size:11px;color:var(--ink-soft);font-weight:700;
}
.foot button{
  border:none;background:none;font-family:inherit;font-size:11px;
  color:var(--ink-soft);font-weight:700;text-decoration:underline;padding:6px;
}
</style>
</head>
<body>

<div class="wrap" id="screen-game">
  <div class="pet-area" id="pet-area">
    <div class="pet-face" id="pet-face"></div>
    <div class="pet-info">
      <div class="meter" id="meter"></div>
    </div>
  </div>

  <div class="levels">
    <button class="lv" id="lv1" onclick="setLevel(1)">1</button>
    <button class="lv" id="lv2" onclick="setLevel(2)">2</button>
    <button class="lv" id="lv3" onclick="setLevel(3)">3</button>
  </div>

  <div class="quiz">
    <div class="roma" id="roma"></div>
    <div class="slots" id="slots"></div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="foot">
    <button onclick="resetPet()">リセット</button>
  </div>
</div>

<div class="overlay hidden" id="overlay">
  <div class="ov-card" id="ov-card"></div>
</div>

/* =========================================================
   状態
========================================================= */
let S=null;
const DEF={pet:null,stage:0,meter:0,level:1,doneCount:0,lastWord:{},cycleUsed:[]};
function load(){
  try{S=Object.assign({},DEF,JSON.parse(localStorage.getItem('mojiPet')||'{}'));}
  catch(e){S=Object.assign({},DEF);}
}
function save(){localStorage.setItem('mojiPet',JSON.stringify(S));}

let cur=null;
let pos=0;

/* =========================================================
   サウンド (Web Audio)
========================================================= */
let AC=null;
function ac(){if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC;}
function tone(f,t0,dur,type,vol){
  const a=ac(),o=a.createOscillator(),g=a.createGain();
  o.type=type||'sine';o.frequency.value=f;
  g.gain.setValueAtTime(vol||.18,a.currentTime+t0);
  g.gain.exponentialRampToValueAtTime(.001,a.currentTime+t0+dur);
  o.connect(g);g.connect(a.destination);
  o.start(a.currentTime+t0);o.stop(a.currentTime+t0+dur+.05);
}
function sndOK(){try{tone(660,0,.12);tone(880,.1,.18);}catch(e){}}
function sndNG(){try{tone(220,0,.2,'triangle',.12);}catch(e){}}
function sndWord(){try{[523,659,784,1047].forEach((f,i)=>tone(f,i*.09,.25));}catch(e){}}
function sndGrow(){try{[523,659,784,880,1047,1319].forEach((f,i)=>tone(f,i*.11,.3));}catch(e){}}

/* =========================================================
   ペット表示
========================================================= */
/* 成長するほど表示サイズを大きくする
   あかちゃん=枠上部1/3余白 / こども=上部1/4余白 / おとな=枠ギリギリ */
const SIZE_S=[58,66,81,106,106];
const SIZE_B=[100,112,132,160,225];
function petVisual(sp,stage,big){
  const imgs=PET_IMG[sp];
  const s=(big?SIZE_B:SIZE_S)[stage];
  if(imgs&&imgs[stage])return `<img src="${imgs[stage]}" style="max-width:${s}px;max-height:${s}px;" alt="">`;
  return '🥚';
}
function renderPet(){
  document.getElementById('pet-face').innerHTML=petVisual(S.pet,S.stage);
  const m=document.getElementById('meter');
  m.innerHTML='';
  for(let i=0;i<GROW_AT;i++){
    const s=document.createElement('span');
    if(i<S.meter)s.className='on';
    m.appendChild(s);
  }
}
function bouncePet(){
  const f=document.getElementById('pet-face');
  f.classList.remove('bounce');void f.offsetWidth;f.classList.add('bounce');
}

/* =========================================================
   出題
========================================================= */
function pickWord(){
  /* 1段階そだつまで(10回正解まで)同じ問題は出さない */
  const list=WORDS[S.level];
  const used=S.cycleUsed||[];
  let pool=list.filter(w=>!used.includes(w.w)&&w.w!==S.lastWord[S.level]);
  if(pool.length===0)pool=list.filter(w=>w.w!==S.lastWord[S.level]);
  if(pool.length===0)pool=list;
  const w=pool[Math.floor(Math.random()*pool.length)];
  S.lastWord[S.level]=w.w;save();
  cur=w;pos=0;
  renderQuiz();
  makeGrid();
}
function renderQuiz(){
  const chars=cur.w.split('');
  const sp=cur.sp||[];
  document.getElementById('roma').innerHTML=
    cur.r.map((r,i)=>{
      const t=(i===pos)?`<u style="text-decoration-color:#FFD98E;text-decoration-thickness:3px;">${r}</u>`:r;
      return sp.includes(i)?`<b>${t}</b>`:t;
    }).join(' ');
  document.getElementById('slots').innerHTML=
    chars.map((c,i)=>{
      if(i<pos)return `<div class="slot done${sp.includes(i)?' sp':''}">${c}</div>`;
      if(i===pos)return `<div class="slot now" id="slot-now">?</div>`;
      return `<div class="slot"></div>`;
    }).join('');
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function makeGrid(){
  const target=cur.w[pos];
  const set=new Set([target]);
  const cands=[];
  (SIM[target]||[]).forEach(c=>cands.push(c));
  const cp=counterpart(target);if(cp)cands.push(cp);
  shuffle(cands);
  for(const c of cands){if(set.size<4&&!set.has(c)&&canAdd(c,set))set.add(c);}
  while(set.size<9){
    const c=POOL[Math.floor(Math.random()*POOL.length)];
    if(!set.has(c)&&canAdd(c,set))set.add(c);
  }
  const cells=shuffle([...set]);
  document.getElementById('grid').innerHTML=
    cells.map(c=>`<button class="cell" onclick="tap(this,'${c}')">${c}</button>`).join('');
}

/* =========================================================
   タップ判定
========================================================= */
let lock=false;
function tap(btn,c){
  if(lock)return;
  if(c===cur.w[pos]){
    lock=true;
    sndOK();
    pos++;
    bouncePet();
    renderQuiz();
    const now=document.querySelector('.slot.done:nth-child('+pos+')');
    if(now){now.classList.add('pop');}
    setTimeout(()=>{
      lock=false;
      if(pos>=cur.w.length){wordDone();}
      else{makeGrid();}
    },450);
  }else{
    sndNG();
    btn.classList.add('wrong');
  }
}

/* =========================================================
   演出
========================================================= */
function confettiIn(card){
  const em=['🌸','⭐','💖','🌈','✨','🎀'];
  for(let i=0;i<10;i++){
    const s=document.createElement('span');
    s.className='confetti';
    s.textContent=em[i%em.length];
    s.style.left=(5+Math.random()*90)+'%';
    s.style.top='0';
    s.style.animationDelay=(Math.random()*.4)+'s';
    card.appendChild(s);
  }
}
function showOverlay(html,outerHtml){
  const ov=document.getElementById('overlay');
  const card=document.getElementById('ov-card');
  card.innerHTML=html;
  let outer=document.getElementById('ov-outer');
  if(outer)outer.remove();
  if(outerHtml){
    outer=document.createElement('div');
    outer.id='ov-outer';outer.className='ov-outer';
    outer.innerHTML=outerHtml;
    ov.appendChild(outer);
  }
  ov.classList.remove('hidden');
  confettiIn(card);
}
function hideOverlay(){document.getElementById('overlay').classList.add('hidden');}

function wordDone(){
  /* 単語・文を完成 = 1回正解 */
  S.meter++;S.doneCount++;
  S.cycleUsed=(S.cycleUsed||[]);
  S.cycleUsed.push(cur.w);
  if(S.meter>=GROW_AT&&S.stage<4){
    S.stage++;S.meter=0;S.cycleUsed=[];save();renderPet();
    grow();
    return;
  }
  if(S.meter>=GROW_AT){S.meter=0;S.cycleUsed=[];}
  save();renderPet();
  sndWord();
  const sp=cur.sp||[];
  const w=cur.w.split('').map((c,i)=>sp.includes(i)?`<span class="spc">${c}</span>`:c).join('');
  showOverlay(`
    <div class="ov-emoji">${petVisual(S.pet,S.stage,true)}</div>
    <div class="ov-word">${w}</div>
    <div class="ov-msg">できた〜! 🎉</div>
    <button class="ov-btn" onclick="hideOverlay();pickWord();">つぎへ</button>
  `);
}
function grow(){
  sndGrow();
  if(S.stage>=4){
    /* キラキラ = ゴール */
    showOverlay(`
      <div class="ov-emoji">${petVisual(S.pet,4,true)}</div>
      <div class="ov-msg">ぜんもんせいかい<br>おめでとう! 🎉</div>
    `,`<button class="ov-btn" onclick="restart()">もう1かい</button>`);
    return;
  }
  showOverlay(`
    <div class="ov-emoji">${petVisual(S.pet,S.stage,true)}</div>
    <div class="ov-msg">そだったよ! ✨</div>
    <button class="ov-btn" onclick="hideOverlay();pickWord();">やった〜!</button>
  `);
}
function restart(){
  hideOverlay();
  newRandomPet();
  renderPet();
  pickWord();
}

/* =========================================================
   ランダムペット / リセット
========================================================= */
function newRandomPet(){
  const others=PET_KEYS.filter(k=>k!==S.pet);
  S.pet=others[Math.floor(Math.random()*others.length)];
  S.stage=0;S.meter=0;S.cycleUsed=[];save();
}
function resetPet(){
  if(!confirm('あたらしいたまごにする?\n(そだちはリセットされるよ)'))return;
  newRandomPet();
  renderPet();
  pickWord();
}

/* =========================================================
   レベル
========================================================= */
function syncChips(){
  [1,2,3].forEach(i=>document.getElementById('lv'+i).classList.toggle('active',i===S.level));
}
function setLevel(lv){
  S.level=lv;save();
  syncChips();
  pickWord();
}

/* =========================================================
   起動
========================================================= */
load();
if(!S.pet||!PET_IMG[S.pet]){newRandomPet();}
renderPet();
syncChips();
pickWord();
if(S.stage>=4){grow();}
